<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Madina Mobile Narowal - Fast POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0; padding: 0;
        background-color: rgb(241, 245, 249);
        font-family: "Inter", -apple-system, sans-serif;
        box-sizing: border-box;
      }
      .app-wrapper {
        min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: flex-start;
        padding: 16px; box-sizing: border-box;
      }
      .main-card {
        width: 100%; max-width: 600px; background-color: rgb(255, 255, 255);
        border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        padding: 24px; box-sizing: border-box; margin-top: 20px; margin-bottom: 24px;
      }
      .centered-title {
        text-align: center; font-size: 28px; font-weight: 700;
        color: rgb(15, 23, 42); margin-top: 8px; margin-bottom: 24px;
      }
      .input-group { margin-bottom: 16px; width: 100%; box-sizing: border-box; }
      .input-label { display: block; font-size: 14px; font-weight: 600; color: rgb(71, 85, 105); margin-bottom: 6px; }
      .text-input {
        width: 100%; padding: 12px; font-size: 16px;
        border: 1.5px solid rgb(203, 213, 225); border-radius: 8px; box-sizing: border-box;
      }
      .text-input:focus { outline: none; border-color: rgb(59, 130, 246); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
      .input-with-button { position: relative; display: flex; align-items: center; width: 100%; }
      .input-with-button .text-input { padding-right: 48px; }
      .input-action-btn {
        position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
        width: 36px; height: 36px; border-radius: 6px; border: none;
        background-color: rgb(168, 85, 247); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
      }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      .status-box { padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; margin-bottom: 16px; text-align: center; }
      .status-idle { display: none; }
      .status-loading { background-color: rgb(239, 246, 255); border: 1px solid rgb(191, 219, 254); color: rgb(29, 78, 216); }
      .status-success { background-color: rgb(240, 253, 250); border: 1px solid rgb(153, 246, 228); color: rgb(13, 148, 136); }
      .status-error { background-color: rgb(254, 242, 242); border: 1px solid rgb(254, 202, 202); color: rgb(220, 38, 38); }
      
      .btn { padding: 12px 6px; font-size: 13px; font-weight: 600; border-radius: 8px; border: none; color: white; cursor: pointer; width: 100%; }
      .btn-gray { background-color: rgb(100, 116, 139); }
      .btn-purple { background-color: rgb(168, 85, 247); }
      
      .table-wrapper { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid rgb(226, 232, 240); margin-bottom: 24px; }
      .data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
      .data-table th { background-color: rgb(241, 245, 249); color: rgb(71, 85, 105); font-weight: 600; padding: 12px; border-bottom: 1px solid rgb(226, 232, 240); }
      .data-table td { padding: 12px; border-bottom: 1px solid rgb(241, 245, 249); color: rgb(15, 23, 42); }
      .empty-row { text-align: center; color: rgb(100, 116, 139); padding: 20px; font-style: italic; }
      
      .summary-card { background-color: rgb(248, 250, 252); border: 1px solid rgb(226, 232, 240); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
      .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      .summary-label { font-size: 14px; color: rgb(71, 85, 105); }
      .summary-val { font-size: 15px; font-weight: 600; color: rgb(15, 23, 42); }
      .grand-total-highlight { background-color: rgb(59, 130, 246); border-radius: 8px; padding: 12px; color: white; }
      .text-white { color: white !important; }
      .payment-section { border: 1px solid rgb(254, 202, 202); background-color: rgb(254, 242, 242); border-radius: 12px; padding: 16px; }
      .return-box { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
      .return-label { font-size: 15px; font-weight: 700; color: rgb(220, 38, 38); }
      .return-value { font-size: 20px; font-weight: 800; color: rgb(220, 38, 38); }

      /* --- UPDATED FULLSCREEN SCANNER & LASER --- */
      #scanner-container { display: none; }
      #scanner-container.fullscreen-mode {
        position: fixed !important; top: 0 !important; left: 0 !important;
        width: 100vw !important; height: 100vh !important;
        z-index: 9999 !important; background-color: #000 !important;
        margin: 0 !important; display: flex; flex-direction: column;
      }
      #scanner-container.fullscreen-mode #reader { flex: 1; width: 100% !important; height: 100% !important; }
      #scanner-container.fullscreen-mode #reader video { object-fit: cover !important; }
      
      .scanner-header-custom {
        position: absolute; top: 30px; left: 20px; right: 20px;
        display: flex; justify-content: space-between; z-index: 10000;
      }
      .close-scanner-btn {
        background: rgba(220, 38, 38, 0.9); color: white; border: none; padding: 10px 20px;
        border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      
      /* LASER SCANNING ANIMATION */
      #scanner-laser {
        position: absolute; left: 10%; width: 80%; height: 3px;
        background: #22c55e; box-shadow: 0 0 20px 5px rgba(34, 197, 94, 0.8);
        z-index: 10001; animation: laserScan 1.5s infinite alternate ease-in-out;
        display: none; border-radius: 50%;
      }
      @keyframes laserScan {
        0% { top: 25%; }
        100% { top: 75%; }
      }
    </style>
  </head>
  <body>
    <div class="app-wrapper">
      <div class="main-card">
        <div class="centered-title">Madina Mobile Narowal</div>
        
        <div id="online-loading-bar" style="display: none; background-color: rgb(59, 130, 246); color: white; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; text-align: center; font-weight: 600; animation: pulse 1.2s infinite ease-in-out;">
          Searching Bill online... Please wait
        </div>
        
        <div class="input-group">
          <label class="input-label" for="ref-input">Reference Number (Scan / Enter)</label>
          <div class="input-with-button">
            <input type="tel" class="text-input" id="ref-input" placeholder="Enter or scan 14-digit bill..." maxlength="14" oninput="handleRefInput(this)" onfocus="this.select()">
            <button id="input-scanner-btn" onclick="toggleScanner()" title="Scan QR Code" type="button" class="input-action-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16V21H16"/><path d="M21 9V10"/><path d="M9 21V20"/><path d="M12 16V18"/><path d="M12 12V13"/><path d="M12 8V9"/><path d="M16 12V13"/><path d="M9 12V13"/><path d="M13 21V20"/><path d="M16 16V18"/><rect width="1" height="1" x="7" y="7"/><rect width="1" height="1" x="16" y="7"/><rect width="1" height="1" x="7" y="16"/></svg>
            </button>
          </div>
        </div>

        <div id="status-area" class="status-box status-idle"></div>

        <div id="scanner-container">
          <div class="scanner-header-custom" id="fs-scanner-header" style="display: none;">
             <button class="btn btn-purple" id="fs-toggle-flash-btn" onclick="toggleFlashlight()" style="width: auto; padding: 10px 16px;">Flashlight: Off</button>
             <button class="close-scanner-btn" onclick="stopScanner()">✖ Close</button>
          </div>
          <div id="scanner-laser"></div>
          <div id="reader"></div>
        </div>

        <div style="margin-bottom: 24px;">
          <button class="btn btn-gray" onclick="resetCalculatorPage()">Clear & Reset Page</button>
        </div>

        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr><th>Sr No.</th><th>Bill Details</th><th>Amount</th><th>Charges</th><th>Total</th></tr>
            </thead>
            <tbody id="table-body">
              <tr><td colspan="5" class="empty-row">No bill entries yet.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="summary-card">
          <div class="summary-row"><span class="summary-label">Total Bills</span><span class="summary-val" id="summary-base">PKR 0</span></div>
          <div class="summary-row"><span class="summary-label">Total Charges</span><span class="summary-val" id="summary-charges">PKR 0</span></div>
          <div class="summary-row grand-total-highlight">
            <span class="summary-label text-white" style="font-size: 16px;">Grand Total</span>
            <span class="summary-val text-white" style="font-size: 18px;" id="summary-grand">PKR 0</span>
          </div>
        </div>

        <div class="payment-section">
          <div class="input-group" style="margin-bottom: 0;">
            <label class="input-label" for="paid-amount">Customer Paid Amount</label>
            <input type="tel" class="text-input" id="paid-amount" placeholder="Enter cash received..." oninput="updateCashReturn()">
          </div>
          <div class="return-box">
            <div class="return-label">Return Balance</div>
            <div class="return-value" id="refund-amount">PKR 0</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script type="text/javascript">
      let billingItems = [];
      let html5QrCode = null;
      let isScannerStopping = false;
      let isFlashOn = false;
      let audioCtx = null;

      // 1. Instant Audio Initialization (Square wave for loud POS Beep)
      function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }

      function playBeep() {
        if (!audioCtx) return;
        try {
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          oscillator.type = "square"; // Loud aggressive scanner sound
          oscillator.frequency.value = 1500;
          gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
          oscillator.start(audioCtx.currentTime);
          oscillator.stop(audioCtx.currentTime + 0.15);
        } catch(e) { console.log(e); }
      }

      // Rest of utility functions
      function calculateCharges(amount) {
        if (amount <= 4000) return 20; if (amount <= 8000) return 30;
        if (amount <= 12000) return 50; if (amount <= 18000) return 80;
        if (amount <= 25000) return 120; return Math.round(amount * 0.005);
      }

      function showStatus(text, type) {
        const statusEl = document.getElementById("status-area");
        if (!text) { statusEl.style.display = "none"; return; }
        statusEl.style.display = "block";
        statusEl.className = "status-box status-" + type;
        statusEl.textContent = text;
      }

      function addBillItem(baseAmount, reference) {
        const charges = calculateCharges(baseAmount);
        billingItems.push({ id: billingItems.length + 1, baseAmount, charges, total: baseAmount + charges, reference });
        renderTable(); updateSummary();
      }

      function renderTable() {
        const tbody = document.getElementById("table-body");
        tbody.innerHTML = "";
        if (billingItems.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty-row">No bill entries yet.</td></tr>'; return;
        }
        billingItems.forEach((item, index) => {
          tbody.innerHTML += `<tr><td>${index + 1}</td><td>Ref: ${item.reference}</td><td>PKR ${item.baseAmount}</td><td>PKR ${item.charges}</td><td style="font-weight:bold;">PKR ${item.total}</td></tr>`;
        });
      }

      function updateSummary() {
        let totalBase = 0, totalCharges = 0, grandTotal = 0;
        billingItems.forEach(item => { totalBase += item.baseAmount; totalCharges += item.charges; grandTotal += item.total; });
        document.getElementById("summary-base").textContent = "PKR " + totalBase.toLocaleString();
        document.getElementById("summary-charges").textContent = "PKR " + totalCharges.toLocaleString();
        document.getElementById("summary-grand").textContent = "PKR " + grandTotal.toLocaleString();
        updateCashReturn(grandTotal);
      }

      function updateCashReturn(grandTotal) {
        if(grandTotal === undefined) grandTotal = billingItems.reduce((acc, item) => acc + item.total, 0);
        const paidVal = parseFloat(document.getElementById("paid-amount").value);
        const refundEl = document.getElementById("refund-amount");
        if (isNaN(paidVal) || paidVal === 0) { refundEl.textContent = "PKR 0"; refundEl.style.color = "rgb(220, 38, 38)"; return; }
        const balance = paidVal - grandTotal;
        refundEl.textContent = balance >= 0 ? `PKR ${balance.toLocaleString()} (Change)` : `PKR ${Math.abs(balance).toLocaleString()} (Shortage)`;
        refundEl.style.color = balance >= 0 ? "rgb(34, 197, 94)" : "rgb(220, 38, 38)";
      }

      // API Call
      async function fetchBillFromAPI(referenceNumber) {
        if (billingItems.some(item => item.reference === referenceNumber)) {
          showStatus("Yeh Bill pehle se add hai!", "error"); return;
        }
        document.getElementById("online-loading-bar").style.display = "block";
        try {
          const res = await fetch("https://ccms.pitc.com.pk/api/details/bill?reference=" + referenceNumber);
          const data = await res.json();
          document.getElementById("online-loading-bar").style.display = "none";
          let amnt = null;
          if (data.bill && data.bill.basicInfo && data.bill.basicInfo.currAmntDue) amnt = parseFloat(String(data.bill.basicInfo.currAmntDue).replace(/[^0-9.]/g, ""));
          if (amnt > 0) {
            addBillItem(amnt, referenceNumber);
            showStatus("Bill fetched: PKR " + amnt, "success");
          } else throw new Error();
        } catch (e) {
          document.getElementById("online-loading-bar").style.display = "none";
          showStatus("API issue. Ap manual entry kar saktay hain.", "error");
        }
      }

      function handleRefInput(input) {
        const cleanVal = input.value.replace(/[^0-9]/g, "");
        if (input.value !== cleanVal) input.value = cleanVal;
        if (cleanVal.length === 14) { input.value = ""; input.blur(); fetchBillFromAPI(cleanVal); }
      }

      function parse14DigitReference(txt) {
        if (!txt) return "";
        const m = txt.match(/\d{14}/);
        return m ? m[0] : txt.replace(/[^0-9]/g, "").substring(0, 14);
      }

      // 2. High-Performance Camera Optimization
      async function optimizeCameraTracks() {
        try {
          const videoElem = document.querySelector('#reader video');
          if (videoElem && videoElem.srcObject) {
            const track = videoElem.srcObject.getVideoTracks()[0];
            const caps = track.getCapabilities ? track.getCapabilities() : {};
            const consts = {};
            // Apply Heavy Zoom for small QR
            if (caps.zoom) consts.zoom = Math.min(caps.zoom.max, Math.max(2.5, caps.zoom.min || 1.0));
            if (Object.keys(consts).length > 0) await track.applyConstraints(consts).catch(()=>{});
          }
        } catch(e) {}
      }

      async function openScanner() {
        initAudio(); // Initialize audio immediately on click
        const scannerDiv = document.getElementById("scanner-container");
        scannerDiv.style.display = "flex";
        scannerDiv.classList.add("fullscreen-mode");
        document.getElementById("fs-scanner-header").style.display = "flex";
        document.getElementById("scanner-laser").style.display = "block"; // Start laser

        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        // Request HD video so small QR has enough pixels to be read easily
        const config = {
          fps: 15, // Reduced from 60 to 15 to allow faster startup & crisp focus frames
          qrbox: { width: 280, height: 160 },
          videoConstraints: {
            facingMode: "environment",
            width: { ideal: 1920 }, // High-Res forces small QRs to become readable
            height: { ideal: 1080 }
          }
        };

        const onScanSuccess = async (decodedText) => {
          const cleanNumber = parse14DigitReference(decodedText);
          if (cleanNumber.length === 14) {
            playBeep(); // Instant Beep
            if (billingItems.some(item => item.reference === cleanNumber)) {
              showStatus("Already Scanned!", "error"); return;
            }
            await stopScanner();
            document.getElementById("ref-input").value = cleanNumber;
            fetchBillFromAPI(cleanNumber);
          }
        };

        try {
          await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, ()=>{});
          setTimeout(optimizeCameraTracks, 500); // Apply hardware zoom slightly after video start
        } catch (err) {
          showStatus("Camera start failed.", "error"); await stopScanner();
        }
      }

      // 3. Clean Stop Logic (Removes any leftover text/styles)
      async function stopScanner() {
        if (isScannerStopping) return;
        isScannerStopping = true;
        
        const scannerDiv = document.getElementById("scanner-container");
        scannerDiv.style.display = "none";
        scannerDiv.classList.remove("fullscreen-mode");
        document.getElementById("fs-scanner-header").style.display = "none";
        document.getElementById("scanner-laser").style.display = "none"; // Stop laser
        
        try {
          const videoElem = document.querySelector('#reader video');
          if (videoElem && videoElem.srcObject) videoElem.srcObject.getTracks().forEach(t => t.stop());
        } catch(e) {}

        if (html5QrCode && html5QrCode.isRunning()) {
          try { await html5QrCode.stop(); } catch(e) {}
        }
        isFlashOn = false;
        document.getElementById("fs-toggle-flash-btn").textContent = "Flashlight: Off";
        isScannerStopping = false;
      }

      async function toggleScanner() {
        const scannerContainer = document.getElementById("scanner-container");
        if (scannerContainer.style.display === "flex") await stopScanner();
        else await openScanner();
      }

      async function toggleFlashlight() {
        const videoElem = document.querySelector('#reader video');
        if (videoElem && videoElem.srcObject) {
          const track = videoElem.srcObject.getVideoTracks()[0];
          if (track && track.getCapabilities && track.getCapabilities().torch) {
            isFlashOn = !isFlashOn;
            await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
            document.getElementById("fs-toggle-flash-btn").textContent = isFlashOn ? "Flashlight: On" : "Flashlight: Off";
          }
        }
      }

      function resetCalculatorPage() {
        stopScanner();
        billingItems = [];
        document.getElementById("ref-input").value = "";
        document.getElementById("paid-amount").value = "";
        renderTable(); updateSummary(); showStatus("", "idle");
      }
    </script>
  </body>
</html>
